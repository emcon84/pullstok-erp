version: "3.8"

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: nexo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo_user
      POSTGRES_PASSWORD: nexo_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No mapear puertos externamente - solo acceso interno entre contenedores
    # ports:
    #   - "5434:5432"
    networks:
      - nexo_network

  # API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nexo_api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://nexo_user:nexo_password_123@db:5432/nexo"
      JWT_SECRET: "tu_jwt_secret_key_muy_segura_aqui_123456789"
      PORT: 5000
      NODE_ENV: production
      # Agrega aquí tus credenciales de Cloudinary
      CLOUDINARY_CLOUD_NAME: "tu_cloud_name"
      CLOUDINARY_API_KEY: "tu_api_key"
      CLOUDINARY_API_SECRET: "tu_api_secret"
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - nexo_network
    volumes:
      - ./api/uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./nexo-front
      dockerfile: Dockerfile
    container_name: nexo_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - nexo_network

volumes:
  postgres_data:

networks:
  nexo_network:
    driver: bridge
