# Configuración de Nginx para Pullstok ERP
# Este archivo debe colocarse en /etc/nginx/sites-available/pullstok
# y habilitarse con un symlink en /etc/nginx/sites-enabled/:
#   sudo ln -s /etc/nginx/sites-available/pullstok /etc/nginx/sites-enabled/
#
# Esta es la versión HTTP (puerto 80) inicial. Una vez que el sitio responde
# en HTTP, corré:
#   sudo certbot --nginx -d pullstok.com -d www.pullstok.com -d app.pullstok.com
# y certbot va a:
#   - agregar automáticamente los bloques "listen 443 ssl" con los
#     certificados de Let's Encrypt para cada server_name
#   - convertir estos bloques "listen 80" en redirects 301 a HTTPS
# No hace falta escribir esos bloques a mano.

# --- Landing (marketing, Astro estático) ---
server {
    listen 80;
    listen [::]:80;
    server_name pullstok.com www.pullstok.com;

    root /var/www/pullstok/pullstok-landing/dist;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    client_max_body_size 50M;
}

# --- App (frontend SPA + API) ---
server {
    listen 80;
    listen [::]:80;
    server_name app.pullstok.com;

    root /var/www/pullstok/pullstok-front/dist;
    index index.html;

    # Frontend - SPA de React (Vite build)
    location / {
        try_files $uri /index.html;
    }

    # API - proxy reverso al proceso Node/Express en PM2 (puerto 5000)
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Uploads - imágenes servidas desde disco por la API (api/uploads/)
    location /uploads {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 50M;
}
